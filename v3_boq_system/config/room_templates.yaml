# room_templates.yaml
# Room-based services inference templates.
# When direct MEP schedules are not available, these templates infer probable
# fixture/service bundles from detected room types.
#
# All inferred items carry:
#   quantity_status: inferred
#   confidence: low (unless direct schedule evidence)
#   manual_review: true

# ── Room type keyword matching ─────────────────────────────────────────────────
# Patterns used to classify detected room names into template keys.
room_type_patterns:
  toilet:         ["toilet", "wc", "water closet", "sanitary"]
  accessible_wc:  ["accessible wc", "disabled toilet", "accessible toilet"]
  bathroom:       ["bathroom", "bath", "shower room"]
  laundry:        ["laundry", "wash", "launder"]
  kitchen:        ["kitchen", "kitchenette", "tea point", "pantry"]
  consulting:     ["consult", "consulting", "consultation", "exam", "examination", "treatment"]
  pharmacy:       ["pharmacy", "dispensary", "dispensing", "drug store"]
  office:         ["office", "admin", "administration", "manager", "staff"]
  store:          ["store", "storage", "storeroom", "stock"]
  waiting:        ["waiting", "reception", "lobby", "foyer"]
  corridor:       ["corridor", "passage", "hallway", "hall", "circulation"]
  plant:          ["plant", "electrical", "switchroom", "switch room", "mechanical", "hvac"]
  cleaner:        ["cleaner", "cleaning", "janitor", "mop"]
  unknown:        []

# ── Services bundles per room type ────────────────────────────────────────────
# Each entry:
#   wet_area: true/false — requires waterproofing
#   fixtures: list of fixture/service items to include
#     - name: BOQ item name
#       qty: quantity per room (nr)
#       unit: unit
#       confidence: high/medium/low
#       note: optional justification

room_templates:

  toilet:
    wet_area: true
    waterproofing_m2_each: 6.0
    fixtures:
      - name: WC Pan (close-coupled)
        qty: 1
        unit: nr
        confidence: medium
      - name: WC Cistern
        qty: 1
        unit: nr
        confidence: medium
      - name: Hand Basin
        qty: 1
        unit: nr
        confidence: medium
      - name: Tapware (basin)
        qty: 1
        unit: set
        confidence: medium
      - name: Mirror / Medicine Cabinet
        qty: 1
        unit: nr
        confidence: low
      - name: Toilet Roll Holder
        qty: 1
        unit: nr
        confidence: low
      - name: Hand Towel Rail / Dryer
        qty: 1
        unit: nr
        confidence: low
      - name: Floor Waste
        qty: 1
        unit: nr
        confidence: medium
      - name: Builder's Works — Plumbing (toilet)
        qty: 1
        unit: item
