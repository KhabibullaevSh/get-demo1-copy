# ── Default services (whole-building, not room-specific) ──────────────────────
whole_building_services:
  - name: Main Electrical Switchboard / Distribution Board
    qty: 1
    unit: item
    confidence: low
    note: "1 per building; adjust for sub-boards"
  - name: Main Water Meter / Stopcock
    qty: 1
    unit: item
    confidence: low
  - name: Hot Water System (central)
    qty: 1
    unit: item
    confidence: low
    note: "only if not allocated to individual rooms"
  - name: Smoke Detectors (provisional)
    qty_rule: "ceil(floor_area / 40)"
    unit: nr
    confidence: low
    note: "1 per 40 m² floor area (indicative)"
